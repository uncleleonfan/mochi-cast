name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package extension
        run: pnpm --filter @mochi-cast/extension zip

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mochi-cast-extension
          path: apps/extension/.output/mochi-cast-0.1.0-chrome.zip
