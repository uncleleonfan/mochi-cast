<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻薯投屏</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <img src="/icon128.png" alt="" class="logo" width="28" height="28" />
          <h1 class="title" data-i18n="title">麻薯投屏</h1>
        </div>
        <button type="button" id="link-options" class="icon-btn icon-btn--text" data-i18n="settings">
          设置
        </button>
      </header>

      <p id="page-title" class="page-title"></p>

      <section class="section">
        <div class="section-head">
          <h2 data-i18n="devices">电视设备</h2>
          <button type="button" id="btn-scan" class="link-btn" data-i18n="scan">扫描</button>
        </div>
        <select id="device-select" class="select">
          <option value="" data-i18n="selectDevice">选择设备…</option>
        </select>
        <div class="manual-add">
          <input
            type="text"
            id="manual-ip"
            class="input"
            placeholder="电视 IP，如 192.168.0.103"
            autocomplete="off"
          />
          <button type="button" id="btn-add-ip" class="btn secondary" data-i18n="addIp">
            添加 IP
          </button>
        </div>
        <p id="device-hint" class="hint" data-i18n="deviceHint">
          请确认电脑与电视在同一 Wi‑Fi。自动扫描可能找不到电视，可手动添加 IP
        </p>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 data-i18n="videos">检测到的视频</h2>
          <div class="section-head-actions">
            <span id="video-scan-status" class="scan-badge" title="">—</span>
            <button type="button" id="btn-video-refresh" class="link-btn" title="重新检测视频">↻</button>
          </div>
        </div>
        <ul id="video-list" class="video-list"></ul>
        <p id="video-hint" class="hint hidden" data-i18n="videoHint">
          请先播放视频，再点视频区 ↻ 重新检测；或下方粘贴 m3u8/MP4 直链
        </p>
        <div class="manual-add">
          <input
            type="url"
            id="manual-video-url"
            class="input"
            placeholder="http(s) 视频直链"
            autocomplete="off"
          />
          <button type="button" id="btn-add-video" class="btn secondary" data-i18n="addVideoUrl">
            添加链接
          </button>
        </div>
      </section>

      <section class="controls">
        <button type="button" id="btn-cast" class="btn primary" disabled data-i18n="cast">
          开始投屏
        </button>
        <div class="playback-bar">
          <button type="button" id="btn-pause" class="btn secondary" disabled>⏸</button>
          <button type="button" id="btn-play" class="btn secondary" disabled>▶</button>
          <button type="button" id="btn-stop" class="btn secondary" disabled>⏹</button>
        </div>
        <p id="status" class="status"></p>
      </section>

    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
