<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻薯投屏 - 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>麻薯投屏设置</h1>
        <p class="subtitle">Mochi Cast Settings</p>
      </header>

      <section class="card">
        <h2>通用</h2>
        <label class="field">
          <span>语言 / Language</span>
          <select id="language">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <label class="field checkbox">
          <input type="checkbox" id="autoSelectLastDevice" />
          <span>自动选择上次使用的电视</span>
        </label>
        <label class="field">
          <span>设备发现超时 (ms)</span>
          <input type="number" id="discoveryTimeoutMs" min="3000" max="60000" step="1000" />
        </label>
        <label class="field">
          <span>局域网网段（可选，优先扫描）</span>
          <input
            type="text"
            id="subnetPrefix"
            placeholder="192.168.31"
            autocomplete="off"
          />
        </label>
        <p class="hint">
          自动扫描在 Mac 上可能猜不到网段。若扫描不到电视，请填写路由器网段前三段（与电视 IP 一致），或继续用手动添加 IP。
        </p>
      </section>

      <section class="card">
        <h2>高级</h2>
        <label class="field checkbox">
          <input type="checkbox" id="debug" />
          <span>启用调试日志（扫描 / 投屏过程会写入下方日志）</span>
        </label>
        <p class="hint">
          也可在 <code>chrome://extensions</code> → 麻薯投屏 →「Service Worker」→ Console 查看实时日志。
        </p>
        <div class="log-toolbar">
          <button type="button" id="btn-refresh-logs" class="btn">刷新日志</button>
          <button type="button" id="btn-clear-logs" class="btn">清空日志</button>
          <button type="button" id="btn-copy-logs" class="btn">复制日志</button>
        </div>
        <pre id="debug-log" class="debug-log" aria-label="Debug log">（开启调试后执行一次扫描，再点「刷新日志」）</pre>
      </section>

      <section class="card">
        <h2>关于</h2>
        <p>麻薯投屏 v0.1.0 — 开源 DLNA 浏览器投屏扩展</p>
        <p>
          <a href="https://github.com/mochi-cast/mochi-cast" target="_blank" rel="noopener">
            GitHub 仓库
          </a>
        </p>
        <p class="legal">
          请仅投屏您有权观看的内容。本扩展不提供 DRM 绕过功能。
        </p>
      </section>

      <div class="actions">
        <button type="button" id="btn-save" class="btn primary">保存设置</button>
        <span id="save-status" class="status"></span>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
