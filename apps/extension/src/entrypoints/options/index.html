<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻薯投屏 - 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>麻薯投屏设置</h1>
        <p class="subtitle">Mochi Cast Settings</p>
      </header>

      <section class="card">
        <h2>通用</h2>
        <label class="field">
          <span>语言 / Language</span>
          <select id="language">
            <option value="zh">简体中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <label class="field checkbox">
          <input type="checkbox" id="autoSelectLastDevice" />
          <span>自动选择上次使用的电视</span>
        </label>
        <label class="field">
          <span>设备发现超时 (ms)</span>
          <input type="number" id="discoveryTimeoutMs" min="3000" max="30000" step="1000" />
        </label>
      </section>

      <section class="card">
        <h2>高级</h2>
        <label class="field checkbox">
          <input type="checkbox" id="debug" />
          <span>启用调试日志</span>
        </label>
      </section>

      <section class="card">
        <h2>关于</h2>
        <p>麻薯投屏 v0.1.0 — 开源 DLNA 浏览器投屏扩展</p>
        <p>
          <a href="https://github.com/mochi-cast/mochi-cast" target="_blank" rel="noopener">
            GitHub 仓库
          </a>
        </p>
        <p class="legal">
          请仅投屏您有权观看的内容。本扩展不提供 DRM 绕过功能。
        </p>
      </section>

      <div class="actions">
        <button type="button" id="btn-save" class="btn primary">保存设置</button>
        <span id="save-status" class="status"></span>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
